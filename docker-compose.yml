version: '3.9'
services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bebo
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
  server:
    build: ./server
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/bebo
      PORT: 4000
      JWT_SECRET: supersecretjwt
      JWT_REFRESH_SECRET: supersecretrefresh
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      - db
    ports:
      - '4000:4000'
  client:
    build: ./client
    depends_on:
      - server
    ports:
      - '5173:5173'
volumes:
  db_data:

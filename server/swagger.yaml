openapi: 3.0.3
info:
  title: Bebo Vitamins API
  version: 1.0.0
servers:
  - url: http://localhost:4000
paths:
  /api/auth/register:
    post:
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        '201':
          description: User registered
  /api/auth/login:
    post:
      summary: Login
      responses:
        '200':
          description: JWT tokens
  /api/auth/refresh:
    post:
      summary: Refresh token
      responses:
        '200':
          description: Refreshed tokens
  /api/products:
    get:
      summary: List products
      parameters:
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
      responses:
        '200':
          description: Product list
  /api/products/categories/all:
    get:
      summary: List categories
      responses:
        '200':
          description: Categories
  /api/products/{id}:
    get:
      summary: Get product by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Product
  /api/orders:
    post:
      summary: Create order
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Order created
    get:
      summary: List orders
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Orders
  /api/cart:
    post:
      summary: Summarize cart
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cart summary
  /api/orders/cart:
    post:
      summary: Summarize cart
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cart summary
  /api/admin/products:
    get:
      summary: Admin list products
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Products
    post:
      summary: Admin create product
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Created
  /api/admin/products/{id}:
    put:
      summary: Admin update product
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Updated
    delete:
      summary: Admin delete product
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Deleted
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
